spring.application.name=jobconnect
# App Info
server.port=8080

# JSON Settings
spring.jackson.default-property-inclusion=non_null
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=Asia/Kolkata
# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/jobconnect_db
spring.datasource.username=root
spring.datasource.password=Kadir@2002
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
# Logging
logging.level.root=INFO
logging.level.com.jobportal=DEBUG
logging.pattern.console=%d{HH:mm:ss} [%level] %logger{20} - %msg%n

# CORS
app.cors.allowed-origins=http://localhost:3000,http://localhost:4200

# Custom
app.name=JobConnect
app.version=1.0.0